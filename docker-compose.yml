services:
  web:
    build: .
    restart: always
    env_file: .env
    ports:
      - "3000:3000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./data:/app/data

  worker:
    build: .
    restart: always
    env_file: .env
    command: npm run worker
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./data:/app/data
